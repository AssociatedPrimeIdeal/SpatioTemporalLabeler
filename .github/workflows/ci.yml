name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python: "3.9"
          - os: ubuntu-22.04
            python: "3.12"
          - os: windows-2022
            python: "3.11"
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: minimal
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install Linux Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxcb-cursor0 libxkbcommon-x11-0
      - name: Install
        run: python -m pip install --upgrade pip ".[test]"
      - name: Test
        run: python -m pytest -q
      - name: Compile
        run: python -m compileall -q src main.py tests

  python-package:
    name: Validate Python package
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - name: Smoke-test wheel
        run: |
          python -m pip install --no-deps dist/*.whl
          python -c "import spatiotemporal_labeler; print(spatiotemporal_labeler.__version__)"
      - uses: actions/upload-artifact@v7
        with:
          name: python-package
          path: dist/*
          if-no-files-found: error
          retention-days: 14
